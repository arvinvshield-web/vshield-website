// ─── HOOKS ───
function useInView(threshold = 0.15) {
  const ref = useRef(null);
  const [inView, setInView] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(
      ([e]) => { if (e.isIntersecting) { setInView(true); obs.unobserve(el); } },
      { threshold }
    );
    obs.observe(el);
    return () => obs.disconnect();
  }, [threshold]);
  return [ref, inView];
}

function FadeIn({ children, delay = 0, style = {}, className = "" }) {
  const [ref, inView] = useInView();
  return (
    <div ref={ref} className={className} style={{
      opacity: inView ? 1 : 0,
      transform: inView ? "translateY(0)" : "translateY(36px)",
      transition: `all 0.85s cubic-bezier(0.22,1,0.36,1) ${delay}s`,
      ...style,
    }}>
      {children}
    </div>
  );
}

function Hero() {

    const steps = 60;
    let step = 0;
    const interval = setInterval(() => {
      step++;
      const progress = Math.min(step / steps, 1);
      const ease = 1 - Math.pow(1 - progress, 3);
      setCount({
        years: Math.round(targets.years * ease),
        guards: Math.round(targets.guards * ease),
        clients: Math.round(targets.clients * ease),
      });
      if (step >= steps) clearInterval(interval);

    return () => clearInterval(interval);

// ─── MAIN APP ───
function VShieldWebsite() {
  const [activeSection, setActiveSection] = useState("home");

  useEffect(() => {
    const sections = ["home", "about", "services", "why-us", "clients", "gallery", "contact"];
    const obs = new IntersectionObserver(
      (entries) => {
        entries.forEach((e) => {
          if (e.isIntersecting) setActiveSection(e.target.id);
        });
      },
      { threshold: 0.3 }
    );
    sections.forEach((id) => {
      const el = document.getElementById(id);
      if (el) obs.observe(el);
    });
    return () => obs.disconnect();
  }, []);

  return (
    <div style={{ minHeight: "100vh", background: C.offWhite }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800;900&family=DM+Sans:wght@300;400;500;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { overflow-x: hidden; }
        ::placeholder { color: rgba(255,255,255,0.35); }
        @keyframes slideIn {
          from { opacity: 0; transform: translateX(-16px); }
          to { opacity: 1; transform: translateX(0); }
        }
        @media (max-width: 768px) {
          .desktop-nav { display: none !important; }
          .mobile-nav-btn { display: flex !important; }
          .hero-flex { flex-direction: column !important; }
          .hero-img { display: none !important; }
          .about-flex { flex-direction: column !important; }
          .services-tabs { overflow-x: auto !important; justify-content: flex-start !important; flex-wrap: nowrap !important; }
          .services-tabs button { white-space: nowrap !important; padding: 12px 16px !important; font-size: 11px !important; }
          .services-content { flex-direction: column !important; }
          .why-grid { grid-template-columns: 1fr !important; }
          .clients-grid { flex-direction: column !important; align-items: stretch !important; }
          .clients-grid > div { min-width: unset !important; }
          .contact-flex { flex-direction: column !important; }
          .gallery-grid { grid-template-columns: 1fr !important; }
          .lightbox-arrow { display: none !important; }
          .stats-bar { flex-direction: column !important; }
          .stats-bar > div { border-right: none !important; border-bottom: 1px solid rgba(222,187,84,0.15) !important; padding: 20px 0 !important; }
          .stats-bar > div:last-child { border-bottom: none !important; }
          .cert-flex { flex-direction: column !important; align-items: stretch !important; gap: 12px !important; }
          .cert-flex > div { text-align: center !important; }
          .about-badges { flex-direction: column !important; gap: 16px !important; }
          section { padding-left: 20px !important; padding-right: 20px !important; }
        }
        @media (min-width: 769px) {
          .mobile-nav-btn { display: none !important; }
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: ${C.navyDark}; }
        ::-webkit-scrollbar-thumb { background: ${C.gold}; border-radius: 4px; }
        input:focus, textarea:focus { border-color: ${C.gold} !important; }
      `}</style>

      <Navbar activeSection={activeSection} />
      <Hero />
      <About />
      <Services />
      <WhyUs />
      <Clients />
      <Gallery />
      <Contact />
      <Footer />
      <WhatsAppFloat />
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<VShieldWebsite />);
    </script>
